name: Publish package

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: Release type
        required: true
        default: patch
        type: choice
        options: [major, minor, patch, prerelease]
      pre-release-tag:
        description: "Pre-release tag (only for prerelease)"
        required: false
        default: "dev"
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check permission
        if: ${{ !contains('["277601505"]', github.actor_id) }}
        run: echo 'Permission denied' && exit 1
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Configure git user
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump & publish (prerelease)
        if: ${{ inputs.releaseType == 'prerelease' }}
        env:
          PRE_RELEASE_TAG: ${{ inputs.pre-release-tag }}
        run: npm version prerelease --preid "$PRE_RELEASE_TAG" --no-git-tag-version && npm publish --provenance --access public --tag "$PRE_RELEASE_TAG" --no-git-checks
      - name: Bump & publish (release)
        if: ${{ inputs.releaseType != 'prerelease' }}
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
        run: npm version "$RELEASE_TYPE" --no-git-tag-version && npm publish --provenance --access public
      - name: Commit change
        if: ${{ inputs.releaseType != 'prerelease' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: bump sdk version"
