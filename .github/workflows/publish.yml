name: Publish package

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: Release type
        required: true
        default: patch
        type: choice
        options: [major, minor, patch, prerelease]
      pre-release-tag:
        description: "Pre-release tag (only for prerelease)"
        required: false
        default: "dev"
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check permission
        if: ${{ !contains(fromJSON('["26142789"]'), github.actor_id) }}
        run: echo 'Permission denied' && exit 1
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - name: Configure git user
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump & publish (prerelease)
        if: ${{ inputs.releaseType == 'prerelease' }}
        env:
          PRE_RELEASE_TAG: ${{ inputs.pre-release-tag }}
        run: npm version prerelease --preid "$PRE_RELEASE_TAG" --no-git-tag-version && npm publish --provenance --access public --tag "$PRE_RELEASE_TAG" --no-git-checks
      - name: Bump & publish (release)
        if: ${{ inputs.releaseType != 'prerelease' }}
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
        run: npm version "$RELEASE_TYPE" --no-git-tag-version && npm publish --provenance --access public
      - name: Commit change
        if: ${{ inputs.releaseType != 'prerelease' }}
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore: bump sdk version"
