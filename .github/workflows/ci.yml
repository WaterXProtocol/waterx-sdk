# Single PR pipeline for `main`: replaces legacy `lint.yml` + `unit-test.yml` (no duplicate runs).
# Core: pnpm lint, typecheck, build, vitest unit (coverage) + single test-e2e job (simulate only).
# Extra: Trivy, Semgrep, gitleaks, pnpm audit, dry smoke chain (testnet simulate-only; skips without signer secrets).
# On-chain integration is local-only (`pnpm test:integration`; needs keys + funded wallet — not run in CI).

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Setup
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  # `pnpm lint` = ESLint + Prettier (--check) on src, test, scripts, examples, and root configs.
  lint:
    needs: setup
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm typecheck

  build:
    needs: setup
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm build

  # Unit tests (coverage + JUnit). E2E simulate runs in separate `test-e2e` job.
  test:
    needs: setup
    runs-on: ubuntu-latest
    name: Test (unit)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Vitest — unit + coverage + JUnit
        run: pnpm exec vitest run --project unit --coverage --reporter=dot --reporter=junit --outputFile=test-results-unit.xml
      - name: Test report (unit)
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: perp-sdk Unit Tests
          path: test-results-unit.xml
          reporter: java-junit
      - name: Coverage summary
        if: always()
        run: |
          FILE="coverage/coverage-summary.json"
          if [ -f "$FILE" ]; then
            node --input-type=module -e '
              import { readFileSync } from "node:fs";
              const c = JSON.parse(readFileSync(process.argv[1], "utf8")).total;
              const f = (v) => v.pct + "%";
              console.log("## @waterx/perp-sdk — Test coverage\n");
              console.log("| Metric | Coverage |");
              console.log("|--------|----------|");
              console.log("| Statements | " + f(c.statements) + " |");
              console.log("| Branches | " + f(c.branches) + " |");
              console.log("| Functions | " + f(c.functions) + " |");
              console.log("| Lines | " + f(c.lines) + " |");
            ' "$FILE" >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-perp-sdk
          path: coverage/
          retention-days: 7

  # Simulate e2e (single job; no matrix / --shard — add both if runtime grows).
  test-e2e:
    needs: setup
    runs-on: ubuntu-latest
    name: E2E simulate
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Vitest e2e (dot + JUnit)
        env:
          NODE_NO_WARNINGS: "1"
          # Testnet feed ids are on Hermes Beta (prod Hermes 404s them). Uses PYTH_DEFAULTS.TESTNET;
          # SDK single-fetch only — e2e skips Hermes 429/5xx via skipHermesIfFeedUnavailable.
          WATERX_E2E_NETWORK: testnet
        run: pnpm exec vitest run --project e2e --reporter=dot --reporter=junit --outputFile=test-results-e2e.xml
      - name: Test report (e2e)
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: perp-sdk E2E simulate
          path: test-results-e2e.xml
          reporter: java-junit

  # Testnet dry smoke chain (zero-write, simulate-only) against the committed
  # default fixture account (owned by the smoke signer, funded with standing
  # USD CREDIT + WLP). Materializes the signer keystore from repo secrets.
  # Skipped — never failed — when SUI_KEYSTORE/SUI_ACTIVE_ADDRESS are absent
  # (e.g. forked PRs), so it never blocks external contributors.
  smoke-chain-dry:
    needs: setup
    runs-on: ubuntu-latest
    name: Smoke chain (testnet, dry)
    steps:
      - name: Check signer secret
        id: signer
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
        run: |
          if [ -z "$SUI_KEYSTORE" ] || [ -z "$SUI_ACTIVE_ADDRESS" ]; then
            echo "::notice::SUI signer secrets absent — skipping dry smoke chain"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v5
        if: steps.signer.outputs.available == 'true'
      - uses: pnpm/action-setup@v5
        if: steps.signer.outputs.available == 'true'
      - uses: actions/setup-node@v5
        if: steps.signer.outputs.available == 'true'
        with:
          node-version: 24
      - id: cache-nm
        if: steps.signer.outputs.available == 'true'
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.signer.outputs.available == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Materialize sui keystore + client.yaml from secrets
        if: steps.signer.outputs.available == 'true'
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
        run: |
          mkdir -p "$HOME/.sui/sui_config"
          printf '%s' "$SUI_KEYSTORE" > "$HOME/.sui/sui_config/sui.keystore"
          # smoke scripts only parse `active_address` out of client.yaml.
          printf 'active_env: testnet\nactive_address: "%s"\n' "$SUI_ACTIVE_ADDRESS" \
            > "$HOME/.sui/sui_config/client.yaml"
          chmod 600 "$HOME/.sui/sui_config/sui.keystore"
      - name: Run dry smoke chain (zero-write)
        if: steps.signer.outputs.available == 'true'
        env:
          NODE_NO_WARNINGS: "1"
        run: pnpm smoke:chain:dry
      - name: Cleanup secrets
        if: always()
        run: rm -rf "$HOME/.sui/sui_config"

  trivy:
    runs-on: ubuntu-latest
    name: "Security: Trivy Scan"
    steps:
      - uses: actions/checkout@v5
      - name: Trivy scan (table — fail on CRITICAL)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
        if: always()
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  semgrep:
    runs-on: ubuntu-latest
    name: "Security: SAST"
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5
      - run: semgrep scan --config auto --error

  gitleaks:
    runs-on: ubuntu-latest
    name: "Security: Secret detection"
    steps:
      - uses: actions/checkout@v5
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect --source /repo --no-git --redact --verbose

  audit:
    needs: setup
    runs-on: ubuntu-latest
    name: "Security: pnpm audit (advisory)"
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm audit
        id: audit
        run: |
          set +e
          output=$(pnpm audit --prod --audit-level=high 2>&1)
          exit_code=$?
          echo "$output"
          {
            echo 'AUDIT_OUTPUT<<AUDIT_EOF'
            echo "$output"
            echo 'AUDIT_EOF'
          } >> "$GITHUB_ENV"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Summary
        env:
          AUDIT_EXIT_CODE: ${{ steps.audit.outputs.exit_code }}
        run: |
          if [ "$AUDIT_EXIT_CODE" = "0" ]; then
            echo "### pnpm audit — no high+ prod issues" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### pnpm audit — findings (advisory, non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '<details><summary>Report</summary>' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$AUDIT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi
