# Single PR pipeline for `main`: replaces legacy `lint.yml` + `unit-test.yml` (no duplicate runs).
# Core: pnpm lint, typecheck, build, vitest unit (coverage) + single test-e2e job (simulate only).
# Extra: Trivy, Semgrep, gitleaks, pnpm audit, dry smoke chain (testnet simulate-only; skips without signer secrets).
# On-chain integration is local-only (`pnpm test:integration`; needs keys + funded wallet — not run in CI).

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Setup
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  # `pnpm lint` = ESLint + Prettier (--check) on src, test, scripts, examples, and root configs.
  lint:
    needs: setup
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    needs: setup
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Vitest — post-build package exports smoke
        run: pnpm exec vitest run --project post-build --reporter=dot

  # Unit tests (coverage + JUnit). E2E simulate runs in separate `test-e2e` job.
  test:
    needs: setup
    runs-on: ubuntu-latest
    name: Test (unit)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Vitest — unit (perp + prediction) + coverage + JUnit
        run: pnpm exec vitest run --project unit --project predict-unit --coverage --reporter=dot --reporter=junit --outputFile=test-results-unit.xml
      - name: Test report (unit)
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: perp-sdk Unit Tests
          path: test-results-unit.xml
          reporter: java-junit
      - name: Coverage summary
        if: always()
        run: |
          FILE="coverage/coverage-summary.json"
          if [ -f "$FILE" ]; then
            node --input-type=module -e '
              import { readFileSync } from "node:fs";
              const c = JSON.parse(readFileSync(process.argv[1], "utf8")).total;
              const f = (v) => v.pct + "%";
              console.log("## @waterx/sdk — Test coverage\n");
              console.log("| Metric | Coverage |");
              console.log("|--------|----------|");
              console.log("| Statements | " + f(c.statements) + " |");
              console.log("| Branches | " + f(c.branches) + " |");
              console.log("| Functions | " + f(c.functions) + " |");
              console.log("| Lines | " + f(c.lines) + " |");
            ' "$FILE" >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-perp-sdk
          path: coverage/
          retention-days: 7

  # Simulate e2e (single job; no matrix / --shard — add both if runtime grows).
  test-e2e:
    needs: setup
    runs-on: ubuntu-latest
    name: E2E simulate
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Vitest e2e (dot + JUnit)
        env:
          NODE_NO_WARNINGS: "1"
          # Testnet feed ids are on Hermes Beta (prod Hermes 404s them). Uses PYTH_DEFAULTS.TESTNET;
          # SDK single-fetch only — e2e skips Hermes 429/5xx via skipHermesIfFeedUnavailable.
          WATERX_E2E_NETWORK: testnet
        run: pnpm exec vitest run --project e2e --reporter=dot --reporter=junit --outputFile=test-results-e2e.xml
      - name: Test report (e2e)
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: perp-sdk E2E simulate
          path: test-results-e2e.xml
          reporter: java-junit

  # Prediction-line e2e (testnet simulate; read-only, single fork to avoid public-RPC 429).
  # On-chain integration (`predict-integration`) needs a funded key — local-only, like perp's.
  test-e2e-predict:
    needs: setup
    runs-on: ubuntu-latest
    name: E2E simulate (prediction)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Vitest predict-e2e (dot + JUnit)
        env:
          NODE_NO_WARNINGS: "1"
        run: pnpm exec vitest run --project predict-e2e --reporter=dot --reporter=junit --outputFile=test-results-predict-e2e.xml
      - name: Test report (predict-e2e)
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: prediction E2E simulate
          path: test-results-predict-e2e.xml
          reporter: java-junit

  # Testnet dry smoke chain (zero-write, simulate-only) against the committed
  # default fixture account (owned by the smoke signer, funded with standing
  # USD CREDIT + WLP). A dry run never signs — `client.simulate()` only needs
  # the sender ADDRESS — so NO keystore / secret is required: the orchestrator
  # falls back to the committed default signer address when no client.yaml is
  # present. Runs on every PR, including forks. (Override the fixture by setting
  # the `SUI_SMOKE_ADDRESS` repo variable + `WATERX_SMOKE_ACCOUNT_ID`.)
  smoke-chain-dry:
    needs: setup
    runs-on: ubuntu-latest
    name: Smoke chain (testnet, dry)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - id: cache-nm
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies (cache miss)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Run dry smoke chain (zero-write, no keystore)
        env:
          NODE_NO_WARNINGS: "1"
          # Optional override; empty falls back to the committed default signer.
          SUI_ACTIVE_ADDRESS: ${{ vars.SUI_SMOKE_ADDRESS }}
          WATERX_SMOKE_ACCOUNT_ID: ${{ vars.WATERX_SMOKE_ACCOUNT_ID }}
        run: pnpm smoke:chain:dry

  trivy:
    runs-on: ubuntu-latest
    name: "Security: Trivy Scan"
    steps:
      - uses: actions/checkout@v5
      - name: Trivy scan (table — fail on CRITICAL)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
        if: always()
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  semgrep:
    runs-on: ubuntu-latest
    name: "Security: SAST"
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5
      - run: semgrep scan --config auto --error

  gitleaks:
    runs-on: ubuntu-latest
    name: "Security: Secret detection"
    steps:
      - uses: actions/checkout@v5
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect --source /repo --no-git --redact --verbose

  audit:
    needs: setup
    runs-on: ubuntu-latest
    name: "Security: pnpm audit (advisory)"
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm audit
        id: audit
        run: |
          set +e
          output=$(pnpm audit --prod --audit-level=high 2>&1)
          exit_code=$?
          echo "$output"
          {
            echo 'AUDIT_OUTPUT<<AUDIT_EOF'
            echo "$output"
            echo 'AUDIT_EOF'
          } >> "$GITHUB_ENV"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Summary
        env:
          AUDIT_EXIT_CODE: ${{ steps.audit.outputs.exit_code }}
        run: |
          if [ "$AUDIT_EXIT_CODE" = "0" ]; then
            echo "### pnpm audit — no high+ prod issues" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### pnpm audit — findings (advisory, non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '<details><summary>Report</summary>' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$AUDIT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi
