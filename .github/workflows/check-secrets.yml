name: Check Secrets

on:
  pull_request:
    branches:
      - main

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install Git Secrets
        run: sudo apt-get install git-secrets
      - name: Scan for secrets
        run: git secrets --scan
