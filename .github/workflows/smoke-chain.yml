# Live testnet smoke chain (run-smoke-chain.ts): mint USD (USDC + USDSUI) ->
# credit withdraw -> WLP deposit -> stake -> mint-and-stake -> happy path ->
# keeper match -> custody.
#
# Runs in DRY mode by default (nightly + manual): every step is simulate-only,
# `executeOnly` steps (happy-path, keeper-match) are skipped, so the run NEVER
# broadcasts a transaction. Manual dispatch can pick `execute` to broadcast the
# full chain (self-funding) instead.
#
# This is intentionally not a PR CI gate: it depends on a maintained live
# testnet fixture account. Run it manually before releases, and keep the
# scheduled dry run as a testnet health signal.
#
# A dry run is simulate-only: it never signs, so it needs only the sender
# ADDRESS (no keystore). The orchestrator falls back to a committed default
# signer + fixture account, so `dry` needs NO secrets at all. The fixture wxa
# account holds a STANDING balance (≥ a few USD CREDIT + ≥ the stake amount in
# WLP) — dry sims read live balances but never deduct, so one top-up funds the
# dry chain indefinitely. The `execute` mode self-funds and DOES need the key.
#
# Repo secrets — required ONLY for `execute` (dry needs none):
#   SUI_KEYSTORE             full contents of ~/.sui/sui_config/sui.keystore
#                            (JSON array of base64 keys; must contain the key
#                            for SUI_ACTIVE_ADDRESS)
#   SUI_ACTIVE_ADDRESS       0x… address that signs (funded with SUI gas; holds
#                            MOCK_USDC + MOCK_USDSUI and owns the wxa account)
#   WATERX_SMOKE_ACCOUNT_ID  0x… wxa account id reused across steps (owned by
#                            SUI_ACTIVE_ADDRESS; funded with standing USD + WLP)

name: Smoke Chain (testnet)

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly — dry (zero-write)
  workflow_dispatch:
    inputs:
      mode:
        description: "dry (simulate-only, zero-write) or execute (broadcast full chain)"
        type: choice
        options:
          - dry
          - execute
        default: dry

permissions:
  contents: read

concurrency:
  group: smoke-chain # one run at a time (shared on-chain account)
  cancel-in-progress: false

jobs:
  smoke-chain:
    runs-on: ubuntu-latest
    name: Smoke chain (testnet)
    timeout-minutes: 20
    steps:
      - name: Resolve mode (schedule → dry)
        id: mode
        env:
          MODE_INPUT: ${{ github.event.inputs.mode }}
        run: |
          mode="${MODE_INPUT:-dry}"
          case "$mode" in
            dry|execute) ;;
            *)
              echo "::error::invalid mode: $mode"
              exit 1
              ;;
          esac
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      # `execute` signs + broadcasts, so it needs the keystore secrets. `dry`
      # is simulate-only and needs none — it falls back to the committed default
      # signer address + fixture account.
      - name: Preflight — check signer secrets (execute only)
        id: signer
        if: steps.mode.outputs.mode == 'execute'
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
          WATERX_SMOKE_ACCOUNT_ID: ${{ secrets.WATERX_SMOKE_ACCOUNT_ID }}
        run: |
          missing=
          [ -z "$SUI_KEYSTORE" ] && missing="$missing SUI_KEYSTORE"
          [ -z "$SUI_ACTIVE_ADDRESS" ] && missing="$missing SUI_ACTIVE_ADDRESS"
          [ -z "$WATERX_SMOKE_ACCOUNT_ID" ] && missing="$missing WATERX_SMOKE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::execute mode needs secret(s):$missing — add them in repo Settings → Secrets → Actions"
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Materialize sui keystore + client.yaml (execute only)
        if: steps.mode.outputs.mode == 'execute'
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
        run: |
          mkdir -p "$HOME/.sui/sui_config"
          printf '%s' "$SUI_KEYSTORE" > "$HOME/.sui/sui_config/sui.keystore"
          # smoke scripts only parse `active_address` out of client.yaml.
          printf 'active_env: testnet\nactive_address: "%s"\n' "$SUI_ACTIVE_ADDRESS" \
            > "$HOME/.sui/sui_config/client.yaml"
          chmod 600 "$HOME/.sui/sui_config/sui.keystore"

      - name: Run smoke chain (${{ steps.mode.outputs.mode }})
        env:
          NODE_NO_WARNINGS: "1"
          SMOKE_MODE: ${{ steps.mode.outputs.mode }}
          # Dry: empty → orchestrator uses committed defaults. Execute: the secrets.
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
          WATERX_SMOKE_ACCOUNT_ID: ${{ secrets.WATERX_SMOKE_ACCOUNT_ID }}
          # `loadConfig` (and smoke-remote step 0) has no built-in default; supply the
          # canonical testnet config (override via the `WATERX_CONFIG_URL` repo variable).
          WATERX_CONFIG_URL: ${{ vars.WATERX_CONFIG_URL || 'https://raw.githubusercontent.com/WaterXProtocol/waterx-config/main/testnet.json' }}
        run: |
          if [ "$SMOKE_MODE" = "execute" ]; then
            pnpm smoke:chain
          else
            pnpm smoke:chain:dry
          fi

      - name: Cleanup secrets
        if: always()
        run: rm -rf "$HOME/.sui/sui_config"
