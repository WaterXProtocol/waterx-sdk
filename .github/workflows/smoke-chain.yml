# Live testnet smoke chain (run-smoke-chain.ts): account create -> mint USD ->
# credit withdraw -> WLP deposit -> stake -> happy path -> keeper match -> custody.
#
# This broadcasts REAL testnet transactions (several steps execute even in
# --dry-run), so it is NOT part of the PR `ci.yml` pipeline (which is
# simulate-only and keyless). It runs on a nightly schedule + manual dispatch,
# gated on repo secrets holding a funded testnet signer.
#
# Required repo secrets:
#   SUI_KEYSTORE           full contents of ~/.sui/sui_config/sui.keystore
#                          (a JSON array of base64 keys; must contain the key
#                          for SUI_ACTIVE_ADDRESS)
#   SUI_ACTIVE_ADDRESS     0x… address that signs (must be funded with SUI gas
#                          + own the wxa account below + hold MOCK_USDC)
#   WATERX_SMOKE_ACCOUNT_ID  0x… wxa account id reused across steps (must be
#                          owned by SUI_ACTIVE_ADDRESS and funded with USD)

name: Smoke Chain (testnet)

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
    inputs:
      mode:
        description: "execute (broadcast) or dry (simulate-only steps where supported)"
        type: choice
        options:
          - execute
          - dry
        default: execute

permissions:
  contents: read

concurrency:
  group: smoke-chain # one live run at a time (shared on-chain account)
  cancel-in-progress: false

jobs:
  smoke-chain:
    runs-on: ubuntu-latest
    name: Smoke chain (testnet)
    timeout-minutes: 20
    steps:
      - name: Preflight — require signer secrets
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
          WATERX_SMOKE_ACCOUNT_ID: ${{ secrets.WATERX_SMOKE_ACCOUNT_ID }}
        run: |
          missing=
          [ -z "$SUI_KEYSTORE" ] && missing="$missing SUI_KEYSTORE"
          [ -z "$SUI_ACTIVE_ADDRESS" ] && missing="$missing SUI_ACTIVE_ADDRESS"
          [ -z "$WATERX_SMOKE_ACCOUNT_ID" ] && missing="$missing WATERX_SMOKE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::missing required secret(s):$missing — add them in repo Settings → Secrets → Actions"
            exit 1
          fi
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Materialize sui keystore + client.yaml from secrets
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
          SUI_ACTIVE_ADDRESS: ${{ secrets.SUI_ACTIVE_ADDRESS }}
        run: |
          mkdir -p "$HOME/.sui/sui_config"
          printf '%s' "$SUI_KEYSTORE" > "$HOME/.sui/sui_config/sui.keystore"
          # smoke scripts only parse `active_address` out of client.yaml.
          printf 'active_env: testnet\nactive_address: "%s"\n' "$SUI_ACTIVE_ADDRESS" \
            > "$HOME/.sui/sui_config/client.yaml"
          chmod 600 "$HOME/.sui/sui_config/sui.keystore"
      - name: Run smoke chain
        env:
          NODE_NO_WARNINGS: "1"
          WATERX_SMOKE_ACCOUNT_ID: ${{ secrets.WATERX_SMOKE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "dry" ]; then
            pnpm smoke:chain:dry
          else
            pnpm smoke:chain
          fi
      - name: Cleanup secrets
        if: always()
        run: rm -rf "$HOME/.sui/sui_config"
